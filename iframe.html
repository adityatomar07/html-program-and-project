<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iframes</title>
</head>
<body>
    <h2>Html iframes</h2>
    <p>you can use the height and widht attributes 
        to specify the size of the iframe:
    </p>
    <iframe src="demo_iframe.html" name="iframe_a" frameborder="30px"></iframe>

    <h1>Iframe target link</h1>
    <p><a href="https://github.com/" target="iframe_a">github.com</a></p>
    <p>When you target attribute of a link matches the name of an iframe ,the link will open in the iframe.</p>
</body>
</html>
