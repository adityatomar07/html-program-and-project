<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html class Attribute</title>
    <style>
        .city {
            background-color: brown;
            color: white;
            border: 2px solid black;
            margin: 20px;
            padding: 20px;
        }
        .note{
            font-size: 120%;
            color: red;
            border: 1px solid black;
        }
    /*Style the element with the id "my header"*/
    #myHeader {
        background-color: blueviolet;
        color: blue;
        padding: 10px;
        text-align: center;
    }   
    


    </style>
</head>
<body>
    <div class="city">
        <h2 id="myHeader">Meerut</h2>
        <p>One of the most famous city in Uttar Pradesh</p>
    </div>
    <div class="city">
        <h2>Ghaziabad</h2>
        <p>Called Small Delhi.</p>
    </div>
    <div class="city">
        <h2 id="myHeader">Lucknow</h2>
        <p>Capital of Uttar Pradesh</p>
    </div>
    <!--this is for Span-->
    <h1>My favourite city is <span class="note">Meerut</span> city</h1>
    <p>because Meerut is my <span class="note">division</span></p>


</body>
</html>
