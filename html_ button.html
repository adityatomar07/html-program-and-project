<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>buttons</title>
    <style>
        .testbtn{
            background-color: silver;
            color: white;
            font-size: 15px;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .testbtn:hover{
            background: #059862;
        }
    </style>
</head>
<body>
    <h1>Html buttons</h1>
    <p>Deafult button with no styling : </p>
    <button>click me</button>
    <p>Styled button</p>
    <button class="testbtn">Green button</button>
</body>
</html>
