<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> how to create table </title>
    <style>
        table,th,td {
            border: 1px solid black;
            border-collapse: collapse;
        }
          th, td {
            background-color: aquamarine;
        }

    </style>
</head>
<body>
    <h2> A basic html table </h2>
    <table style="width: 100%;">
        <tr>
            <th>Company</th>
            <th>Contact</th>
            <th>Country</th>
        </tr>
        <tr>
            <td>Aditya tomar</td>
            <td>237xxx45</td>
            <td>India</td>
        </tr>
        <tr>
            <td>Dev bhai</td>
            <td>78200xxx37</td>
            <td>India</td>
        </tr>
        <tr>
            <td>Tiger don</td>
            <td>3456xxx77</td>
            <td>India</td>
        </tr>

    </table>
    <p style="color: brown;">this is our first basic <mark>HTML</mark>table </p>
</body>
</html>
