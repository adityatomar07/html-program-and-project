<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Advance table </title>
    <style>
       table, th,td {
           /*
            border: 1px solid black;
            border-top-left-radius: 10px;
            */
            border-style: ridge;
            border-collapse: collapse;
        }
        th,td {
            padding-block-start: 15px;
        }
    </style>

    
</head>
<body>
    <h2>table with rounded border</h2>
    <p>use css border-radius property to add rounded corner in  table </p>
    <table style="width: 100%;">
        <tr>
        <th colspan="1">first name</th>
        <th>last name</th>
        <th>Age</th
        </tr>
        <tr>
            <td rowspan="1">Aditya</td>
            <td>tomar</td>
            <td>19</td>
        </tr>
        <td>Yash</td>
        <td>tomar</td>
        <td>11</td>
    </table>
</body>
</html>
